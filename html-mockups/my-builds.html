<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Builds | Car Enthusiast PH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --surface-2: #eeeeef;
      --text: #111111;
      --text-2: #6b7280;
      --text-3: #9ca3af;
      --accent: #dc2626;
      --border: #e4e4e7;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.06);
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      --r: 14px;
      --pill: 999px;
    }

    body[data-theme="dark"] {
      --bg: #0f1115;
      --surface: #171a20;
      --surface-2: #1d2129;
      --text: #f5f7fa;
      --text-2: #a2aab8;
      --text-3: #6e7786;
      --accent: #ff5a4f;
      --accent-orange: #ff9b3d;
      --accent-orange-2: #ffb457;
      --border: #2a303a;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.24);
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.34);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.25s ease, color 0.25s ease;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      min-height: 58px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
    }

    .logo em { color: var(--accent); font-style: normal; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--pill);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      color: var(--text);
      border-color: #999;
      background: var(--surface);
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
    }

    .btn-accent:hover { filter: brightness(1.05); }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: clamp(30px, 4vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .header p {
      margin-top: 8px;
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.6;
    }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tabs {
      display: inline-flex;
      gap: 4px;
      border: 1px solid var(--border);
      border-radius: var(--pill);
      background: var(--bg);
      padding: 3px;
    }

    .tab-btn {
      border: none;
      border-radius: var(--pill);
      background: transparent;
      color: var(--text-2);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .stat {
      font-size: 12px;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--pill);
      padding: 8px 12px;
      background: color-mix(in srgb, var(--surface) 84%, var(--bg));
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
      min-height: 260px;
    }

    .cover {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .card-body {
      padding: 12px;
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.3;
    }

    .meta, .desc {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.6;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-radius: var(--pill);
      padding: 4px 8px;
      white-space: nowrap;
    }

    .badge-draft { background: #fef3c7; color: #92400e; }
    .badge-published { background: #d1fae5; color: #065f46; }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: var(--text-3);
      background: color-mix(in srgb, var(--surface) 86%, var(--bg));
      font-size: 13px;
    }

    body[data-theme="dark"] .btn-outline {
      color: var(--accent-orange-2);
      border-color: color-mix(in srgb, var(--accent-orange) 45%, var(--border));
      background: color-mix(in srgb, var(--accent-orange) 10%, transparent);
    }

    body[data-theme="dark"] .btn-outline:hover {
      color: #1a1205;
      border-color: var(--accent-orange-2);
      background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-2) 100%);
    }

    body[data-theme="dark"] .btn-accent {
      background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-2) 100%);
      color: #1a1205;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 680px) {
      nav { padding: 12px; }
      .wrap { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="animate__animated animate__fadeIn" style="animation-duration:0.4s;">
    <a class="logo" href="index.html">CEPH<em>.</em></a>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline" id="themeToggle" type="button" aria-pressed="false" aria-label="Switch to dark theme">
        <span id="themeToggleIcon">☀</span>
        <span id="themeToggleLabel">Dark Mode</span>
      </button>
      <a class="btn btn-outline" href="browse-builds.html">Browse Builds</a>
      <a class="btn btn-accent" href="add-build.html">Add Build</a>
    </div>
  </nav>

  <main class="wrap animate__animated animate__fadeInUp" style="animation-duration:0.45s;">
    <section class="header">
      <div>
        <h1>My Builds</h1>
        <p>Manage all your draft and published builds in one place.</p>
      </div>
    </section>

    <section class="toolbar">
      <div class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="all" type="button">All</button>
        <button class="tab-btn" data-tab="draft" type="button">Draft</button>
        <button class="tab-btn" data-tab="published" type="button">Published</button>
      </div>
      <div class="stat" id="countStat">0 build(s)</div>
    </section>

    <section class="grid" id="buildGrid"></section>
    <section class="empty" id="emptyState" style="display:none;">No builds in this tab yet.</section>
  </main>

  <script>
    const THEME_KEY = 'ceph-build-theme';
    const BUILDS_KEY = 'ceph-user-builds';

    const themeToggle = document.getElementById('themeToggle');
    const themeToggleLabel = document.getElementById('themeToggleLabel');
    const themeToggleIcon = document.getElementById('themeToggleIcon');

    const tabs = document.getElementById('tabs');
    const buildGrid = document.getElementById('buildGrid');
    const emptyState = document.getElementById('emptyState');
    const countStat = document.getElementById('countStat');

    const state = {
      tab: 'all'
    };

    function getThemeIcon(theme) {
      return theme === 'dark' ? '☾' : '☀';
    }

    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      themeToggle.setAttribute('aria-pressed', String(theme === 'dark'));
      themeToggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
      themeToggleLabel.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      themeToggleIcon.textContent = getThemeIcon(theme);
    }

    function initTheme() {
      const storedTheme = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(storedTheme || (prefersDark ? 'dark' : 'light'));
    }

    function loadBuilds() {
      try {
        const raw = localStorage.getItem(BUILDS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveBuilds(builds) {
      localStorage.setItem(BUILDS_KEY, JSON.stringify(builds));
    }

    function ensureDefaultBuildLists() {
      const builds = loadBuilds();
      const hasDraft = builds.some(item => item && item.status === 'draft');
      const hasPublished = builds.some(item => item && item.status === 'published');

      if (!hasPublished) {
        builds.push({
          id: 'sample-published-build',
          status: 'published',
          title: 'Street OEM+ FK8',
          year: '2020',
          make: 'Honda',
          model: 'Civic Type R',
          summary: 'Daily-driven OEM+ setup with subtle visual upgrades.',
          approxCost: '285000',
          updatedAt: new Date().toISOString()
        });
      }

      if (!hasDraft) {
        builds.push({
          id: 'sample-draft-build',
          status: 'draft',
          title: 'Weekend Track Prep',
          year: '2018',
          make: 'Subaru',
          model: 'WRX STI',
          summary: 'In-progress track-focused setup. Alignment and aero pending.',
          approxCost: '430000',
          updatedAt: new Date().toISOString()
        });
      }

      if (!hasDraft || !hasPublished) {
        saveBuilds(builds);
      }
    }

    function fmtDate(value) {
      if (!value) return 'Unknown update';
      return new Date(value).toLocaleString('en-PH', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function resolveCover(item) {
      const front = item.requiredPhotoNames && item.requiredPhotoNames.front;
      const side = item.requiredPhotoNames && item.requiredPhotoNames.side;
      const rear = item.requiredPhotoNames && item.requiredPhotoNames.rear;
      if (front || side || rear) {
        return 'https://placehold.co/900x520/1D2129/F5F7FA?text=Build+Photos+Saved+Locally';
      }
      return 'https://placehold.co/900x520/E8E8E8/999?text=No+Preview+Image';
    }

    function getFilteredBuilds() {
      const all = loadBuilds().sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
      if (state.tab === 'all') return all;
      return all.filter(item => item.status === state.tab);
    }

    function renderBuilds() {
      const builds = getFilteredBuilds();
      countStat.textContent = `${builds.length} build(s)`;

      if (builds.length === 0) {
        buildGrid.innerHTML = '';
        emptyState.style.display = '';
        return;
      }

      emptyState.style.display = 'none';
      buildGrid.innerHTML = builds.map(item => {
        const makeModel = `${item.year || ''} ${item.make || ''} ${item.model || ''}`.trim();
        const badgeClass = item.status === 'published' ? 'badge-published' : 'badge-draft';
        const summary = item.summary || 'No summary added.';
        const price = item.approxCost ? `PHP ${Number(item.approxCost).toLocaleString('en-PH')}` : 'No estimate';

        return `
          <article class="card">
            <img class="cover" src="${resolveCover(item)}" alt="Build cover" />
            <div class="card-body">
              <div class="row">
                <h2 class="title">${item.title || 'Untitled Build'}</h2>
                <span class="badge ${badgeClass}">${item.status || 'draft'}</span>
              </div>
              <p class="meta">${makeModel || 'Vehicle not specified'}</p>
              <p class="desc">${summary}</p>
              <p class="meta">Cost: ${price}</p>
              <p class="meta">Updated: ${fmtDate(item.updatedAt)}</p>
            </div>
          </article>
        `;
      }).join('');
    }

    tabs.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.tab = btn.dataset.tab;
        tabs.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        renderBuilds();
      });
    });

    themeToggle.addEventListener('click', () => {
      const nextTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
    });

    initTheme();
    ensureDefaultBuildLists();
    renderBuilds();
  </script>
</body>
</html>
