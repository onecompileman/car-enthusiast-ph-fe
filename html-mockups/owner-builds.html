<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Profile | Car Enthusiast PH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --surface-2: #eeeeef;
      --text: #111111;
      --text-2: #6b7280;
      --text-3: #9ca3af;
      --accent: #dc2626;
      --border: #e4e4e7;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.06);
      --pill: 999px;
    }

    body[data-theme="dark"] {
      --bg: #0f1115;
      --surface: #171a20;
      --surface-2: #1d2129;
      --text: #f5f7fa;
      --text-2: #a2aab8;
      --text-3: #6e7786;
      --accent: #ff5a4f;
      --accent-orange: #ff9b3d;
      --accent-orange-2: #ffb457;
      --border: #2a303a;
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.24);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.25s ease, color 0.25s ease;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      min-height: 58px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
    }
    .logo em { color: var(--accent); font-style: normal; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--pill);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { color: var(--text); border-color: #999; background: var(--surface); }

    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { filter: brightness(1.05); }

    .btn-following {
      background: color-mix(in srgb, var(--surface) 84%, var(--bg));
      color: var(--text);
      border: 1px solid var(--border);
    }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .owner-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .owner-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      background: var(--surface-2);
    }

    .identity h1 {
      font-size: clamp(26px, 3.7vw, 40px);
      line-height: 0.96;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .identity p { color: var(--text-2); font-size: 13px; margin-top: 5px; }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 12px;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--pill);
      padding: 7px 10px;
      background: color-mix(in srgb, var(--surface) 86%, var(--bg));
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .section-head h2 { font-size: 20px; font-weight: 800; }

    .count {
      font-size: 12px;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--pill);
      padding: 7px 10px;
      background: color-mix(in srgb, var(--surface) 86%, var(--bg));
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .build-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      min-height: 260px;
    }

    .cover {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .body {
      padding: 12px;
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .title-row h3 { font-size: 15px; font-weight: 800; line-height: 1.3; }

    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-radius: var(--pill);
      padding: 4px 8px;
      white-space: nowrap;
      background: #d1fae5;
      color: #065f46;
    }

    .meta, .desc { font-size: 12px; color: var(--text-2); line-height: 1.6; }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: var(--text-3);
      background: color-mix(in srgb, var(--surface) 86%, var(--bg));
      font-size: 13px;
    }

    body[data-theme="dark"] .btn-outline {
      color: var(--accent-orange-2);
      border-color: color-mix(in srgb, var(--accent-orange) 45%, var(--border));
      background: color-mix(in srgb, var(--accent-orange) 10%, transparent);
    }

    body[data-theme="dark"] .btn-outline:hover {
      color: #1a1205;
      border-color: var(--accent-orange-2);
      background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-2) 100%);
    }

    body[data-theme="dark"] .btn-accent {
      background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-2) 100%);
      color: #1a1205;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 680px) {
      nav { padding: 12px; }
      .wrap { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
      .identity { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav class="animate__animated animate__fadeIn" style="animation-duration:0.4s;">
    <a class="logo" href="index.html">CEPH<em>.</em></a>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline" id="themeToggle" type="button" aria-pressed="false" aria-label="Switch to dark theme">
        <span id="themeToggleIcon">☀</span>
        <span id="themeToggleLabel">Dark Mode</span>
      </button>
      <a class="btn btn-outline" href="browse-builds.html">Browse Builds</a>
      <a class="btn btn-outline" href="my-builds.html">My Builds</a>
    </div>
  </nav>

  <main class="wrap animate__animated animate__fadeInUp" style="animation-duration:0.45s;">
    <section class="owner-card">
      <div class="owner-top">
        <div class="identity">
          <img class="avatar" src="https://placehold.co/180x180/111/fff?text=JR" alt="Owner avatar" />
          <div>
            <h1 id="ownerName">Jun Reyes</h1>
            <p id="ownerHandle">@junreyes_fk8 · Manila, PH</p>
          </div>
        </div>
        <button id="followBtn" class="btn btn-accent" type="button">Follow</button>
      </div>
      <div class="chips">
        <span class="chip" id="statBuilds">0 published builds</span>
        <span class="chip">FK8 / EG / S14</span>
        <span class="chip">Aero + Street Setup</span>
      </div>
    </section>

    <section class="section-head">
      <h2>Owner Builds</h2>
      <span class="count" id="countStat">0 build(s)</span>
    </section>

    <section class="grid" id="buildGrid"></section>
    <section class="empty" id="emptyState" style="display:none;">No published builds yet.</section>
  </main>

  <script>
    const THEME_KEY = 'ceph-build-theme';
    const BUILDS_KEY = 'ceph-user-builds';
    const FOLLOWED_OWNERS_KEY = 'ceph-followed-owners';
    const OWNER_ID = 'owner-jun-reyes';

    const themeToggle = document.getElementById('themeToggle');
    const themeToggleLabel = document.getElementById('themeToggleLabel');
    const themeToggleIcon = document.getElementById('themeToggleIcon');

    const followBtn = document.getElementById('followBtn');
    const buildGrid = document.getElementById('buildGrid');
    const emptyState = document.getElementById('emptyState');
    const countStat = document.getElementById('countStat');
    const statBuilds = document.getElementById('statBuilds');

    function getThemeIcon(theme) {
      return theme === 'dark' ? '☾' : '☀';
    }

    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      themeToggle.setAttribute('aria-pressed', String(theme === 'dark'));
      themeToggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
      themeToggleLabel.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      themeToggleIcon.textContent = getThemeIcon(theme);
    }

    function initTheme() {
      const storedTheme = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(storedTheme || (prefersDark ? 'dark' : 'light'));
    }

    function loadBuilds() {
      try {
        const raw = localStorage.getItem(BUILDS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function fmtDate(value) {
      if (!value) return 'Unknown update';
      return new Date(value).toLocaleString('en-PH', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function resolveCover(item) {
      const front = item.requiredPhotoNames && item.requiredPhotoNames.front;
      const side = item.requiredPhotoNames && item.requiredPhotoNames.side;
      const rear = item.requiredPhotoNames && item.requiredPhotoNames.rear;
      if (front || side || rear) {
        return 'https://placehold.co/900x520/1D2129/F5F7FA?text=Owner+Build+Photo';
      }
      return 'https://placehold.co/900x520/E8E8E8/999?text=No+Preview+Image';
    }

    function getOwnerPublishedBuilds() {
      const published = loadBuilds().filter(item => item && item.status === 'published');
      if (published.length > 0) return published;

      return [
        {
          id: 'sample-owner-1',
          status: 'published',
          title: 'FK8 Street Aero Setup',
          year: '2020',
          make: 'Honda',
          model: 'Civic Type R',
          summary: 'Daily street setup with balanced fitment and aero pieces.',
          approxCost: '320000',
          updatedAt: new Date().toISOString()
        },
        {
          id: 'sample-owner-2',
          status: 'published',
          title: 'S14 Weekend Slide Build',
          year: '1998',
          make: 'Nissan',
          model: 'Silvia S14',
          summary: 'Reliable weekend drift setup with refreshed suspension and cooling.',
          approxCost: '410000',
          updatedAt: new Date().toISOString()
        }
      ];
    }

    function renderBuilds() {
      const builds = getOwnerPublishedBuilds().sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
      countStat.textContent = `${builds.length} build(s)`;
      statBuilds.textContent = `${builds.length} published build(s)`;

      if (builds.length === 0) {
        buildGrid.innerHTML = '';
        emptyState.style.display = '';
        return;
      }

      emptyState.style.display = 'none';
      buildGrid.innerHTML = builds.map(item => {
        const makeModel = `${item.year || ''} ${item.make || ''} ${item.model || ''}`.trim();
        const summary = item.summary || 'No summary added.';
        const price = item.approxCost ? `PHP ${Number(item.approxCost).toLocaleString('en-PH')}` : 'No estimate';

        return `
          <article class="build-card">
            <img class="cover" src="${resolveCover(item)}" alt="Build cover" />
            <div class="body">
              <div class="title-row">
                <h3>${item.title || 'Untitled Build'}</h3>
                <span class="badge">published</span>
              </div>
              <p class="meta">${makeModel || 'Vehicle not specified'}</p>
              <p class="desc">${summary}</p>
              <p class="meta">Cost: ${price}</p>
              <p class="meta">Updated: ${fmtDate(item.updatedAt)}</p>
            </div>
          </article>
        `;
      }).join('');
    }

    function loadFollowedOwners() {
      try {
        const raw = localStorage.getItem(FOLLOWED_OWNERS_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveFollowedOwners(owners) {
      localStorage.setItem(FOLLOWED_OWNERS_KEY, JSON.stringify(owners));
    }

    function isFollowingOwner() {
      return loadFollowedOwners().includes(OWNER_ID);
    }

    function renderFollowButton() {
      const following = isFollowingOwner();
      followBtn.textContent = following ? 'Following' : 'Follow';
      followBtn.classList.toggle('btn-accent', !following);
      followBtn.classList.toggle('btn-following', following);
    }

    followBtn.addEventListener('click', () => {
      const owners = loadFollowedOwners();
      const idx = owners.indexOf(OWNER_ID);
      if (idx >= 0) {
        owners.splice(idx, 1);
      } else {
        owners.push(OWNER_ID);
      }
      saveFollowedOwners(owners);
      renderFollowButton();
    });

    themeToggle.addEventListener('click', () => {
      const nextTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
    });

    initTheme();
    renderFollowButton();
    renderBuilds();
  </script>
</body>
</html>
