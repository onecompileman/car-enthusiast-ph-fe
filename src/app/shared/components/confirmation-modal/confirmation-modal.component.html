<div class="cap-confirmation-modal">
  <div class="modal-header cap-confirmation-modal__header">
    <h5 class="modal-title">{{ title }}</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      [disabled]="isSubmitting"
      (click)="cancel()"
    ></button>
  </div>

  <div class="modal-body cap-confirmation-modal__body">
    <p>{{ message }}</p>
    <div class="cap-confirmation-modal__error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </div>

  <div class="modal-footer cap-confirmation-modal__footer">
    <button
      type="button"
      class="btn btn-outline"
      [disabled]="isSubmitting"
      (click)="cancel()"
    >
      {{ cancelText }}
    </button>
    <button
      type="button"
      class="btn btn-accent"
      [disabled]="isSubmitting"
      (click)="confirm()"
    >
      <i class="fa fa-spin fa-spinner me-2" *ngIf="isSubmitting"></i>
      {{ confirmText }}
    </button>
  </div>
</div>
