<div class="cap-review-step">
  <div *ngIf="!isStepsAllValid" class="alert alert-danger">
    <strong>Error!</strong> Please fix the errors in the following form, before
    proceeding.
    <ul class="mb-0">
      <li *ngFor="let step of invalidSteps">{{ step }}</li>
    </ul>
  </div>
  <div *ngIf="saveErrorMessage" class="alert alert-danger">
    <strong>Error!</strong> {{ saveErrorMessage }}
  </div>
  <div class="cap-review-step__grid">
    <div class="cap-review-step__card">
      <h3>Build Overview</h3>
      <p>{{ buildOverview }}</p>
    </div>

    <div class="cap-review-step__card">
      <h3>Photo Coverage</h3>
      <ul>
        <li *ngFor="let line of photoLines">{{ line }}</li>
      </ul>
    </div>

    <div class="cap-review-step__card">
      <h3>Hotspot Mods</h3>
      <ul>
        <li *ngFor="let line of modLines">{{ line }}</li>
      </ul>
    </div>

    <div class="cap-review-step__card">
      <h3>Performance Mods</h3>
      <ul>
        <li *ngFor="let line of perfLines">{{ line }}</li>
      </ul>
    </div>

    <div class="cap-review-step__card">
      <h3>Gallery Count</h3>
      <p>{{ galleryCount }}</p>
    </div>
  </div>

  <div class="cap-review-step__actions">
    <button type="button" class="btn btn-outline" [disabled]="!isStepsAllValid" (click)="saveDraft()">
      Save as Draft
    </button>
    <button type="button" class="btn btn-accent" [disabled]="!isStepsAllValid" (click)="publish()">
      Publish Build
    </button>
  </div>
</div>
