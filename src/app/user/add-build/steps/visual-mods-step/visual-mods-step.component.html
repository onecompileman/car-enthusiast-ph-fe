<div class="cap-visual-mods-step">
  <div class="cap-visual-mods-step__layout">
    <div class="cap-visual-mods-step__stage-wrap">
      <div class="cap-visual-mods-step__stage-tabs">
        <button
          *ngFor="let tab of viewTabs"
          type="button"
          class="cap-visual-mods-step__stage-tab"
          [class.cap-visual-mods-step__stage-tab--active]="activeView === tab.view"
          (click)="setView(tab.view)"
        >
          {{ tab.label }}
        </button>
      </div>

      <p class="cap-wizard-hint cap-visual-mods-step__hint">
        Pick a mod from the right list, click "Place Hotspot", then click on the car image.
      </p>

      <button
        type="button"
        class="btn btn-outline cap-visual-mods-step__drawer-toggle"
        (click)="toggleModDrawer()"
      >
        Visual Mods ({{ mods.length }})
      </button>

      <div
        class="cap-visual-mods-step__stage"
        [class.cap-visual-mods-step__stage--placing]="placingModId"
        (click)="onStageClick($event)"
      >
        <img [src]="stageImageUrl" alt="Hotspot placement image" />

        <ng-container *ngFor="let mod of mods; let i = index">
          <ng-container *ngIf="mod.hotspots[activeView] as pt">
            <span
              class="cap-visual-mods-step__hotspot-dot"
              [style.left.%]="pt.x"
              [style.top.%]="pt.y"
            >{{ i + 1 }}</span>
            <span
              class="cap-visual-mods-step__hotspot-label"
              [style.left.%]="pt.x"
              [style.top.%]="pt.y"
            >{{ mod.name }}</span>
          </ng-container>
        </ng-container>
      </div>
    </div>

    <aside
      class="cap-visual-mods-step__mod-box"
      [class.cap-visual-mods-step__mod-box--drawer-open]="isModDrawerOpen"
    >
      <div class="cap-visual-mods-step__mod-head">
        <h3>Visual Mods</h3>
        <div class="cap-visual-mods-step__mod-head-actions">
          <button type="button" class="btn btn-outline" (click)="openCreateModModal()">Add Visual Mod</button>
          <button type="button" class="btn btn-outline cap-visual-mods-step__drawer-close" (click)="closeModDrawer()">Close</button>
        </div>
      </div>

      <div class="cap-wizard-empty" *ngIf="mods.length === 0">No visual mods added yet.</div>

      <div class="cap-visual-mods-step__mod-list" *ngIf="mods.length > 0">
        <cap-visual-mod-item
          *ngFor="let mod of mods"
          [mod]="mod"
          [activeView]="activeView"
          [isPlacing]="placingModId === mod.id"
          (edit)="openEditModModal($event)"
          (place)="startPlacing($event)"
          (remove)="removeMod($event)"
        ></cap-visual-mod-item>
      </div>
    </aside>
  </div>

  <button
    type="button"
    class="cap-visual-mods-step__drawer-backdrop"
    [class.cap-visual-mods-step__drawer-backdrop--active]="isModDrawerOpen"
    (click)="closeModDrawer()"
    aria-label="Close visual mods drawer"
  ></button>

</div>
