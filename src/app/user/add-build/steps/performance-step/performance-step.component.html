<div class="cap-performance-step">
  <div class="cap-performance-step__perf-box">
    <div class="cap-performance-step__head">
      <h3>Performance Mods</h3>
      <button
        type="button"
        class="btn btn-outline"
        [disabled]="performanceSkipped"
        (click)="openAddModModal()"
      >
        Add Performance Mod
      </button>
    </div>

    <label class="cap-performance-step__toggle-row">
      <input
        type="checkbox"
        [checked]="performanceSkipped"
        (change)="onSkipChange($event)"
      />
      No performance mods for this build
    </label>

    <div class="cap-wizard-empty" *ngIf="!performanceSkipped && performanceMods.length === 0">
      No performance mods added yet.
    </div>
    <div class="cap-wizard-empty" *ngIf="performanceSkipped">
      Performance mods skipped for this build.
    </div>

    <div class="cap-performance-step__mod-list" *ngIf="!performanceSkipped && performanceMods.length > 0">
      <article class="cap-performance-step__mod-item" *ngFor="let mod of performanceMods">
        <div class="cap-performance-step__mod-row">
          <strong>{{ mod.name }}</strong>
          <span>{{ mod.priceEstimate || 'No price set' }}</span>
        </div>
        <div class="cap-performance-step__mod-row">
          <span>{{ mod.description || 'No description added.' }}</span>
        </div>
        <div class="cap-performance-step__mod-row">
          <span>Shop: {{ mod.shop || 'Not set' }}</span>
          <button type="button" class="btn btn-outline" (click)="removeMod(mod.id)">Remove</button>
        </div>
      </article>
    </div>
  </div>
</div>
